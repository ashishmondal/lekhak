<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lekhak</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet">
  <script>
    // Set the theme before first paint so there is no light/dark flash.
    // Mirrors ThemeService: 'light' | 'dark' | 'system' (or absent => system).
    (function () {
      try {
        var pref = localStorage.getItem('lekhak.theme');
        var systemDark = window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = pref === 'dark' ||
          ((pref === 'system' || !pref) && systemDark);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
